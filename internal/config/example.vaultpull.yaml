# vaultpull configuration example
# Copy to vaultpull.yaml and adjust values.

vault_addr: "https://vault.example.com"
vault_token: ""           # or set VAULT_TOKEN env var
secret_path: "secret/myapp/prod"
env_file: ".env"

# Optional: KV engine version (1 or 2). Default: auto-detect.
# kv_version: 2

# Optional: write backup before overwriting .env
backup: true

# Optional: template to render instead of plain key=value output
# template_path: ".env.tmpl"

# Optional: only include keys with this prefix (prefix stripped from output)
# filter_prefix: "MYAPP_"

# Optional: passphrase to encrypt the written .env file at rest
# encrypt_passphrase: ""

# Optional: TTL for cached secrets (e.g. "1h", "30m")
# ttl: "1h"
